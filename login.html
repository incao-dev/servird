<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiRD — Iniciar sesión</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fafb;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: #1a1a1a;
      }

      .logo {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        text-decoration: none;
      }

      .logo span {
        color: #fbbf24;
      }

      nav a.back {
        text-decoration: none;
        color: #aaaaaa;
        font-size: 14px;
      }

      nav a.back:hover {
        color: #ffffff;
      }

      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid #eeeeee;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }

      .card-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .card-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }

      .card-header h1 {
        font-size: 26px;
        font-weight: 800;
        color: #1a1a1a;
        margin-bottom: 6px;
      }

      .card-header p {
        font-size: 14px;
        color: #666666;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e5e5e5;
        border-radius: 10px;
        font-size: 15px;
        font-family: "Segoe UI", sans-serif;
        color: #1a1a1a;
        background: #ffffff;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #fbbf24;
      }

      .btn-submit {
        width: 100%;
        background: #1a1a1a;
        color: #fbbf24;
        padding: 14px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }

      .btn-submit:hover {
        background: #333333;
      }

      .btn-submit:disabled {
        background: #cccccc;
        color: #888888;
        cursor: not-allowed;
      }

      .error-msg {
        display: none;
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin-top: 12px;
        text-align: center;
      }

      .divider {
        text-align: center;
        font-size: 13px;
        color: #aaaaaa;
        margin: 24px 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-top: 1px solid #eeeeee;
      }

      .register-link {
        text-align: center;
        font-size: 14px;
        color: #666666;
      }

      .register-link a {
        color: #1a1a1a;
        font-weight: 700;
        text-decoration: none;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">Servi<span>RD</span></a>
      <a href="index.html" class="back">← Volver al inicio</a>
    </nav>

    <div class="page">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">🔑</div>
          <h1>Bienvenido de vuelta</h1>
          <p>Inicia sesión para ver tus trabajos y cotizaciones</p>
        </div>

        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" />
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
          Iniciar sesión
        </button>

        <div class="error-msg" id="errorMsg">
          Correo o contraseña incorrectos. Intenta de nuevo.
        </div>

        <div class="divider">o</div>

        <div class="register-link">
          ¿Aún no tienes cuenta?
          <a href="proveedores.html">Regístrate aquí</a>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://yecsryoawlfxqzicoiyf.supabase.co";
      const SUPABASE_KEY = "sb_publishable_WKqk73nGCjPh40zGGDMDTA_UFkMhYoP";

      async function handleLogin() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("errorMsg");

        if (!email || !password) {
          errorMsg.textContent = "Por favor completa todos los campos.";
          errorMsg.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Iniciando sesión...";
        errorMsg.style.display = "none";

        const response = await fetch(
          `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              apikey: SUPABASE_KEY,
            },
            body: JSON.stringify({ email, password }),
          },
        );

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem("servird_token", data.access_token);
          localStorage.setItem("servird_user", JSON.stringify(data.user));
          window.location.href = "dashboard.html";
        } else {
          errorMsg.textContent =
            "Correo o contraseña incorrectos. Intenta de nuevo.";
          errorMsg.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Iniciar sesión";
        }
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
